<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Stream Voice Translator PRO</title>

<style>
body{
  background:#0b0b0b;
  color:#FFD700;
  font-family:'Courier New', Courier, monospace;
  text-align:center;
  padding:40px;
  overflow-x: hidden;
  position: relative;
}

h1{
  font-size:50px;
  display:inline-block;
  color:#FFD700;
  text-shadow: 0 0 5px #FFD700,0 0 10px #FFD700,0 0 20px #FFA500;
  margin-bottom:40px;
  animation: glow 2s infinite alternate;
}

/* Окно ошибки для Opera GX */
#browser-error {
  display: none;
  background: rgba(255, 0, 0, 0.1);
  border: 2px double #ff0000;
  color: #ff4444;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 10px;
  box-shadow: 0 0 15px #ff0000;
  animation: flickerError 0.5s infinite secondary;
}

@keyframes flickerError {
  0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; }
}

button{
  font-size:22px;
  padding:15px 40px;
  background:#222;
  color:#FFD700;
  border:2px solid #FFD700;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  text-shadow: 0 0 3px #000;
  box-shadow: 0 0 10px #FFD700, 0 0 20px #FFA500 inset;
  transition: all 0.2s ease;
  animation: buttonFlicker 2s infinite alternate;
}

button:disabled {
  border-color: #444;
  color: #444;
  cursor: not-allowed;
  box-shadow: none;
}

.box{
  margin-top:25px;
  padding:25px;
  background:#111;
  border-radius:12px;
  font-size:22px;
  text-align:left;
  color:#FFD700;
  text-shadow: 0 0 3px #FFD700;
  box-shadow: 0 0 10px #FFD700 inset, 0 0 20px #FFA500 inset;
  min-height: 50px;
}

.box b{ display:block; font-size:24px; margin-bottom:8px; }

.particle{
  position:absolute;
  width:4px;
  height:4px;
  background:#FFD700;
  border-radius:50%;
  opacity:0.8;
  pointer-events:none;
  animation: floatUp linear infinite;
}

@keyframes floatUp{
  0%{ transform: translateY(0); opacity:0.8; }
  100%{ transform: translateY(-800px); opacity:0; }
}
</style>
</head>
<body>

<div id="browser-error">
  ⚠️ [SYSTEM ERROR]: Браузер не поддерживает Web Speech API.<br>
  OPERA GX заблокировала модуль распознавания. <br>
  ИСПОЛЬЗУЙТЕ: <b>GOOGLE CHROME</b> ИЛИ <b>MS EDGE</b>.
</div>

<h1>Stream Voice Translator</h1>

<button id="btn">START SESSION</button>

<div class="box">
<b>Original:</b>
<div id="orig">...waiting for voice...</div>
</div>

<div class="box">
<b>Translation:</b>
<div id="tran">...waiting for data...</div>
</div>

<script>
const btn = document.getElementById("btn");
const orig = document.getElementById("orig");
const tran = document.getElementById("tran");
const errBox = document.getElementById("browser-error");

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let isActive = false;

// ПРОВЕРКА БРАУЗЕРА ПРИ ЗАГРУЗКЕ
if(!SpeechRecognition) {
    errBox.style.display = "block";
    btn.disabled = true;
    btn.innerText = "NOT SUPPORTED";
}

let rec;
if (SpeechRecognition) {
    rec = new SpeechRecognition();
    rec.lang = "ru-RU";
    rec.continuous = true;
    rec.interimResults = false;

    rec.onend = () => {
        if(isActive) rec.start(); // Перезапуск только если юзер нажал START
    };

    rec.onresult = async e => {
        if (window.speechSynthesis.speaking) return;

        let text = e.results[e.results.length - 1][0].transcript;
        if(!text.trim()) return;

        orig.innerText = text;
        const translated = await translateText(text);
        tran.innerText = translated;

        let speech = new SpeechSynthesisUtterance(translated);
        speech.lang = "en-US";
        speechSynthesis.speak(speech);
    };
}

async function translateText(text) {
    try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=ru&tl=en&dt=t&q=${encodeURIComponent(text)}`;
        const r = await fetch(url);
        const j = await r.json();
        return j[0][0][0];
    } catch (e) { return "Translation Error."; }
}

btn.onclick = () => {
    isActive = true;
    rec.start();
    btn.innerText = "LISTENING...";
    btn.style.boxShadow = "0 0 20px #00FF00, 0 0 30px #008000 inset";
    btn.style.borderColor = "#00FF00";
    btn.style.color = "#00FF00";
};

function createParticles(num){
  for(let i=0;i<num;i++){
    let p=document.createElement('div');
    p.classList.add('particle');
    p.style.left=Math.random()*window.innerWidth+'px';
    p.style.top=Math.random()*window.innerHeight+'px';
    p.style.animationDuration=(Math.random()*5+3)+'s';
    document.body.appendChild(p);
  }
}
createParticles(50);
</script>

</body>
</html>
