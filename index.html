<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>GOLDEN_VOX_TRANSLATOR_PRO</title>

<style>
:root {
  --gold: #FFD700;
  --dark-gold: #B8860B;
  --bg: #050505;
  --glow: rgba(255, 215, 0, 0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--gold);
  font-family: 'Courier New', Courier, monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Сетка на фоне */
body::before {
  content: "";
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background-image: 
    linear-gradient(var(--glow) 1px, transparent 1px),
    linear-gradient(90deg, var(--glow) 1px, transparent 1px);
  background-size: 50px 50px;
  opacity: 0.1;
  z-index: 1;
}

#browser-error {
  display: none;
  background: rgba(255, 0, 0, 0.1);
  border: 1px solid #f00;
  color: #f44;
  padding: 15px;
  position: fixed;
  top: 20px;
  z-index: 100;
  box-shadow: 0 0 20px #f00;
}

h1 {
  font-size: 2.5rem;
  letter-spacing: 8px;
  text-transform: uppercase;
  margin-bottom: 30px;
  text-shadow: 0 0 15px var(--gold);
  z-index: 2;
}

/* Золотая кнопка */
.main-btn {
  position: relative;
  font-size: 1.2rem;
  padding: 18px 50px;
  background: transparent;
  color: var(--gold);
  border: 2px solid var(--gold);
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.4s;
  z-index: 20;
  box-shadow: 0 0 10px var(--glow), inset 0 0 5px var(--glow);
  overflow: hidden;
}

.main-btn:hover {
  background: var(--gold);
  color: #000;
  box-shadow: 0 0 50px var(--gold);
}

.main-btn::after {
  content: "";
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  transition: 0.5s;
}

.main-btn:hover::after { left: 100%; }

.container {
  width: 90%;
  max-width: 850px;
  margin-top: 40px;
  display: grid;
  gap: 25px;
  z-index: 20;
}

.box {
  background: rgba(15, 15, 15, 0.85);
  border-left: 5px solid var(--gold);
  border-right: 1px solid var(--dark-gold);
  border-top: 1px solid var(--dark-gold);
  border-bottom: 1px solid var(--dark-gold);
  padding: 30px;
  position: relative;
  min-height: 120px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* Декоративный уголок */
.box::after {
  content: "";
  position: absolute;
  bottom: 0; right: 0;
  border-style: solid;
  border-width: 0 0 15px 15px;
  border-color: transparent transparent var(--gold) transparent;
}

.label {
  position: absolute;
  top: -10px;
  left: 20px;
  background: var(--bg);
  padding: 0 10px;
  font-size: 0.7rem;
  letter-spacing: 2px;
  color: var(--dark-gold);
}

#orig, #tran {
  font-size: 1.5rem;
  color: #fff;
  text-shadow: 0 0 5px rgba(255,255,255,0.2);
}

/* Золотые частицы */
.particle {
  position: absolute;
  background: var(--gold);
  border-radius: 50%;
  pointer-events: none;
  z-index: 1;
  animation: fly linear infinite;
}

@keyframes fly {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>
<body>

<div id="browser-error">
  [CRITICAL]: WEB_SPEECH_API_OFFLINE // USE CHROME OR EDGE
</div>

<h1>GOLDEN VOX</h1>

<button id="btn" class="main-btn">Initialize Link</button>

<div class="container">
  <div class="box">
    <span class="label">INPUT::RUSSIAN_STREAM</span>
    <div id="orig">AWAITING_VOICE_SIGNAL...</div>
  </div>

  <div class="box">
    <span class="label">OUTPUT::ENGLISH_DECODED</span>
    <div id="tran" style="color: var(--gold);">SYSTEM_READY_FOR_TRANSLATION...</div>
  </div>
</div>

<script>
const btn = document.getElementById("btn");
const orig = document.getElementById("orig");
const tran = document.getElementById("tran");
const errBox = document.getElementById("browser-error");

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let active = false;

if(!SpeechRecognition) {
  errBox.style.display = "block";
  btn.disabled = true;
}

let rec;
if(SpeechRecognition) {
  rec = new SpeechRecognition();
  rec.lang = "ru-RU";
  rec.continuous = true;

  rec.onend = () => { if(active) rec.start(); };

  rec.onresult = async (e) => {
    if (window.speechSynthesis.speaking) return;
    const text = e.results[e.results.length - 1][0].transcript;
    orig.innerText = text.toUpperCase();

    const translated = await translate(text);
    tran.innerText = translated.toUpperCase();

    const utterance = new SpeechSynthesisUtterance(translated);
    utterance.lang = "en-US";
    window.speechSynthesis.speak(utterance);
  };
}

async function translate(text) {
  try {
    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ru&tl=en&dt=t&q=${encodeURIComponent(text)}`);
    const data = await res.json();
    return data[0][0][0];
  } catch(e) { return "TRANS_ERROR"; }
}

btn.onclick = () => {
  active = true;
  rec.start();
  btn.innerText = "LINK ESTABLISHED";
  btn.style.boxShadow = "0 0 40px var(--gold)";
};

// Генератор золотой пыли
function createDust() {
  for(let i=0; i<40; i++) {
    let p = document.createElement('div');
    p.className = 'particle';
    let size = Math.random() * 3 + 'px';
    p.style.width = size;
    p.style.height = size;
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = Math.random() * 100 + 'vh';
    p.style.opacity = Math.random();
    p.style.animationDuration = Math.random() * 5 + 5 + 's';
    document.body.appendChild(p);
  }
}
createDust();
</script>

</body>
</html>
