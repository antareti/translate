<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEURAL_LINK_TRANSLATOR_V3</title>

<style>
:root {
  --neon: #00ff41; /* Цвет матрицы (можно сменить на #FFD700 для золотого) */
  --bg: #050505;
  --glow: rgba(0, 255, 65, 0.5);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--neon);
  font-family: 'Courier New', Courier, monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Эффект сканирующих линий старого монитора */
body::before {
  content: "";
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
              linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
  background-size: 100% 4px, 3px 100%;
  pointer-events: none;
  z-index: 10;
}

/* Бегущая полоса сканера */
body::after {
  content: "";
  position: absolute;
  top: -100px; left: 0; width: 100%; height: 100px;
  background: rgba(0, 255, 65, 0.05);
  box-shadow: 0 0 40px rgba(0, 255, 65, 0.1);
  animation: scan 4s linear infinite;
  z-index: 11;
}

@keyframes scan {
  0% { top: -100px; }
  100% { top: 100%; }
}

#browser-error {
  display: none;
  background: #200;
  border: 2px solid #f00;
  color: #f44;
  padding: 15px;
  position: fixed;
  top: 20px;
  z-index: 100;
  box-shadow: 0 0 20px #f00;
}

h1 {
  font-size: 3rem;
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-bottom: 30px;
  text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon);
  animation: blink 2s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.main-btn {
  position: relative;
  font-size: 1.5rem;
  padding: 20px 60px;
  background: transparent;
  color: var(--neon);
  border: 2px solid var(--neon);
  cursor: pointer;
  outline: none;
  text-transform: uppercase;
  transition: 0.3s;
  z-index: 20;
  box-shadow: 0 0 15px var(--glow), inset 0 0 10px var(--glow);
}

.main-btn:hover {
  background: var(--neon);
  color: #000;
  box-shadow: 0 0 40px var(--neon);
}

.main-btn:disabled {
  border-color: #333;
  color: #333;
  box-shadow: none;
}

.container {
  width: 90%;
  max-width: 900px;
  margin-top: 50px;
  display: grid;
  gap: 20px;
  z-index: 20;
}

.box {
  background: rgba(0, 20, 0, 0.4);
  backdrop-filter: blur(5px);
  border: 1px solid var(--neon);
  padding: 25px;
  border-radius: 4px;
  position: relative;
  min-height: 100px;
  box-shadow: 0 0 15px rgba(0, 255, 65, 0.1);
}

.box::before {
  content: "[DATA_STREAM]";
  position: absolute;
  top: -10px; left: 15px;
  background: var(--bg);
  padding: 0 10px;
  font-size: 12px;
  color: var(--neon);
}

#orig, #tran {
  font-size: 1.4rem;
  line-height: 1.6;
}

.label {
  color: #888;
  font-size: 0.8rem;
  margin-bottom: 10px;
  display: block;
}

/* Пульсирующий фон */
.bg-circles {
  position: absolute;
  width: 400px;
  height: 400px;
  border: 1px solid var(--glow);
  border-radius: 50%;
  animation: pulse 4s infinite;
  z-index: 1;
}

@keyframes pulse {
  0% { transform: scale(0.5); opacity: 1; }
  100% { transform: scale(1.5); opacity: 0; }
}
</style>
</head>
<body>

<div id="browser-error">
  SYSTEM_FAILURE: VOX_RECOGNITION_NOT_DETECTED <br>
  REQUIRED: CHROME_KERNEL_V8
</div>

<div class="bg-circles"></div>
<h1>NEURAL LINK</h1>

<button id="btn" class="main-btn">Activate Link</button>

<div class="container">
  <div class="box">
    <span class="label">INPUT_SIGNAL (RU)</span>
    <div id="orig">...waiting_for_voice_input...</div>
  </div>

  <div class="box" style="border-color: #00d4ff; box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);">
    <span class="label" style="color: #00d4ff;">OUTPUT_SIGNAL (EN)</span>
    <div id="tran" style="color: #00d4ff; text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);">...awaiting_translation...</div>
  </div>
</div>

<script>
const btn = document.getElementById("btn");
const orig = document.getElementById("orig");
const tran = document.getElementById("tran");
const errBox = document.getElementById("browser-error");

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let active = false;

if(!SpeechRecognition) {
  errBox.style.display = "block";
  btn.disabled = true;
  btn.innerText = "LINK_FAILED";
}

let rec;
if(SpeechRecognition) {
  rec = new SpeechRecognition();
  rec.lang = "ru-RU";
  rec.continuous = true;
  rec.interimResults = false;

  rec.onend = () => { if(active) rec.start(); };

  rec.onresult = async (e) => {
    if (window.speechSynthesis.speaking) return;
    const text = e.results[e.results.length - 1][0].transcript;
    orig.innerText = text.toLowerCase();

    const translated = await translate(text);
    tran.innerText = translated.toLowerCase();

    const utterance = new SpeechSynthesisUtterance(translated);
    utterance.lang = "en-US";
    utterance.rate = 1.0;
    window.speechSynthesis.speak(utterance);
  };
}

async function translate(text) {
  try {
    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ru&tl=en&dt=t&q=${encodeURIComponent(text)}`);
    const data = await res.json();
    return data[0][0][0];
  } catch(e) { return "SERVICE_UNAVAILABLE"; }
}

btn.onclick = () => {
  active = true;
  rec.start();
  btn.innerText = "LINK_ACTIVE";
  btn.style.boxShadow = "0 0 50px var(--neon)";
};
</script>

</body>
</html>
