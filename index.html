<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>GOLDEN_AI_LITE</title>

<style>
:root {
  --gold: #FFD700;
  --dark-gold: #413200;
  --bg: #050505;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--gold);
  font-family: 'Segoe UI', Tahoma, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.grid {
  position: absolute;
  width: 100%; height: 100%;
  background-image: radial-gradient(circle at 50% 50%, #1a1a00 0%, #050505 80%);
  z-index: 0;
}

h1 {
  font-size: 2.5rem;
  letter-spacing: 10px;
  margin-bottom: 30px;
  text-shadow: 0 0 10px var(--gold);
  z-index: 2;
  text-align: center;
}

.btn-wrapper {
  position: relative;
  z-index: 10;
  margin-bottom: 40px;
}

.main-btn {
  width: 120px; height: 120px;
  border-radius: 50%;
  background: #000;
  border: 2px solid var(--gold);
  color: var(--gold);
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 15px var(--gold);
  transition: transform 0.2s;
}

.main-btn:active { transform: scale(0.9); }

.container {
  width: 90%; max-width: 800px;
  display: flex; flex-direction: column; gap: 20px;
  z-index: 2;
}

.box {
  background: rgba(20, 20, 20, 0.9);
  border: 1px solid var(--dark-gold);
  padding: 25px;
  border-radius: 10px;
  position: relative;
}

.box b {
  font-size: 0.6rem; color: var(--gold);
  letter-spacing: 2px; display: block; margin-bottom: 10px;
  opacity: 0.6;
}

#orig, #tran { font-size: 1.3rem; color: #fff; min-height: 1.5em; }

.active-border { border-color: var(--gold) !important; box-shadow: 0 0 10px var(--gold); }

</style>
</head>
<body>

<div class="grid"></div>

<h1>GOLDEN_CORE</h1>

<div class="btn-wrapper">
  <button id="btn" class="main-btn">START</button>
</div>

<div class="container">
  <div class="box" id="inputBox">
    <b>[INPUT_SIGNAL (RU/EN)]</b>
    <div id="orig">Ready...</div>
  </div>

  <div class="box" id="outputBox">
    <b>[AI_OUTPUT]</b>
    <div id="tran" style="color: var(--gold);">Waiting...</div>
  </div>
</div>

<script>
const btn = document.getElementById("btn");
const orig = document.getElementById("orig");
const tran = document.getElementById("tran");
const inputBox = document.getElementById("inputBox");

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let active = false;
let rec;

if (SpeechRecognition) {
  rec = new SpeechRecognition();
  // Устанавливаем поддержку обоих языков для распознавания
  rec.lang = "ru-RU"; 
  rec.continuous = true;

  rec.onstart = () => {
    btn.innerText = "LIVE";
    inputBox.classList.add('active-border');
  };

  rec.onend = () => { if (active) rec.start(); };

  rec.onresult = async (event) => {
    if (window.speechSynthesis.speaking) return;

    const speechToText = event.results[event.results.length - 1][0].transcript;
    if (!speechToText.trim()) return;

    orig.innerText = speechToText;
    
    // Пытаемся определить язык и перевести
    const result = await translateAuto(speechToText);
    tran.innerText = result.text;

    const utterance = new SpeechSynthesisUtterance(result.text);
    // Если перевели на русский — говорим по-русски, иначе по-английски
    utterance.lang = result.targetLang === 'ru' ? "ru-RU" : "en-US";
    window.speechSynthesis.speak(utterance);
  };

  btn.onclick = () => {
    if (!active) {
      active = true;
      rec.start();
    }
  };
}

async function translateAuto(text) {
  try {
    // Сначала определяем, какой это язык, чтобы понять куда переводить
    // Мы используем sl=auto, чтобы Google сам понял язык
    // Но чтобы реализовать "туда-обратно", мы сначала переводим на английский.
    // Если результат совпадает с оригиналом, значит оригинал уже был английский — тогда переводим на русский.
    
    let res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(text)}`);
    let data = await res.json();
    let detectedLang = data[2]; // Google возвращает определенный язык в этом индексе
    
    let targetLang = 'en';
    let translatedText = data[0][0][0];

    // Если определенный язык — английский, переводим на русский
    if (detectedLang === 'en') {
      targetLang = 'ru';
      let res2 = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ru&dt=t&q=${encodeURIComponent(text)}`);
      let data2 = await res2.json();
      translatedText = data2[0][0][0];
    }

    return { text: translatedText, targetLang: targetLang };
  } catch(e) { 
    return { text: "Error...", targetLang: "en" }; 
  }
}
</script>

</body>
</html>
